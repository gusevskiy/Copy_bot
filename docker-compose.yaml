services:
  two_bots:
    build:
      context: ./
    container_name: two_bots
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # .session файл монтируем с хоста, а не копируем в образ (см. .dockerignore):
      # 1) он не оседает в слоях образа (это фактически ключ доступа к аккаунту Telegram);
      # 2) обновления, которые Pyrogram пишет в sqlite-файл на лету, переживают
      #    пересоздание контейнера (docker compose up --build / down+up), а не
      #    откатываются к версии, вшитой в образ при последней сборке.
      - ./${SESSION}.session:/app/${SESSION}.session
    # Секреты и списки чатов вынесены в .env (лежит рядом, в .gitignore/.dockerignore),
    # чтобы TOKEN и id чатов не оседали в git-истории этого файла.
    env_file:
      - .env
    command: python3 main.py
    restart: always